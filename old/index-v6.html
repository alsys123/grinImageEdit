<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>iPad Image Editor with Paste Mode + Drag</title>
<style>
  body { font-family: sans-serif; margin: 20px; }
  #toolbar { margin-bottom: 10px; }
  canvas {
    border: 1px solid #333;
    touch-action: none;
    cursor: crosshair;
    max-width: 100%;
    height: auto;
  }
  .active {
    background: #4caf50;
    color: white;
  }
</style>
</head>
<body>
<h1>v6</h1>
<div id="toolbar">
  <input type="file" id="fileInput" accept="image/*">
  <button id="copyBtn" disabled>Copy</button>
  <button id="cutBtn" disabled>Cut</button>
  <button id="pasteModeBtn" disabled>Tap to Paste</button>
  <button id="exportBtn">Export PNG</button>
</div>

<canvas id="canvas" width="800" height="600"></canvas>

<script>
const fileInput = document.getElementById('fileInput');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const copyBtn = document.getElementById('copyBtn');
const cutBtn = document.getElementById('cutBtn');
const pasteModeBtn = document.getElementById('pasteModeBtn');
const exportBtn = document.getElementById('exportBtn');

let img = new Image();
let hasImage = false;

let isSelecting = false;
let pasteMode = false;

let startX = 0, startY = 0;
let currentX = 0, currentY = 0;

let selection = null;
let clipboard = null;

// Pasted object state
let pastedObject = null;
let pastedSelected = false;
let draggingPasted = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

// -------------------------
// Load image
// -------------------------
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      hasImage = true;

      selection = null;
      clipboard = null;
      pastedObject = null;
      pastedSelected = false;

      copyBtn.disabled = true;
      cutBtn.disabled = true;
      pasteModeBtn.disabled = true;

      redraw(); // ensure clean canvas
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// -------------------------
// Coordinate correction for scaled canvas
// -------------------------
function getCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

// -------------------------
// Selection (mouse)
// -------------------------
canvas.addEventListener('mousedown', e => {
  if (!hasImage || pasteMode) return;

  const pos = getCanvasCoords(e.clientX, e.clientY);
  startX = pos.x;
  startY = pos.y;
  currentX = pos.x;
  currentY = pos.y;

  isSelecting = true;
});

canvas.addEventListener('mousemove', e => {
  if (!isSelecting || !hasImage || pasteMode) return;

  const pos = getCanvasCoords(e.clientX, e.clientY);
  currentX = pos.x;
  currentY = pos.y;

  redraw();
  drawSelectionRect();
});

canvas.addEventListener('mouseup', () => finishSelection());

// -------------------------
// Selection (touch)
// -------------------------
canvas.addEventListener('touchstart', e => {
  if (!hasImage || pasteMode) return;
  e.preventDefault();

  const t = e.touches[0];
  const pos = getCanvasCoords(t.clientX, t.clientY);

  startX = pos.x;
  startY = pos.y;
  currentX = pos.x;
  currentY = pos.y;

  isSelecting = true;
});

canvas.addEventListener('touchmove', e => {
  if (!isSelecting || !hasImage || pasteMode) return;
  e.preventDefault();

  const t = e.touches[0];
  const pos = getCanvasCoords(t.clientX, t.clientY);

  currentX = pos.x;
  currentY = pos.y;

  redraw();
  drawSelectionRect();
});

canvas.addEventListener('touchend', e => {
  if (!pasteMode) finishSelection();
});

// -------------------------
// Paste Mode tap handler
// -------------------------
canvas.addEventListener('click', e => {
  if (!pasteMode) return;

  const pos = getCanvasCoords(e.clientX, e.clientY);
  handlePasteModeTap(pos.x, pos.y);
});

canvas.addEventListener('touchstart', e => {
  if (!pasteMode) return;

  const t = e.touches[0];
  const pos = getCanvasCoords(t.clientX, t.clientY);
  handlePasteModeTap(pos.x, pos.y);
});

// -------------------------
// Handle tap in Paste Mode
// -------------------------
function handlePasteModeTap(x, y) {
  if (!clipboard) return;

  // Tap inside pasted object → select it
  if (pastedObject && isInsidePastedObject(x, y)) {
    pastedSelected = true;
    draggingPasted = true;
    dragOffsetX = x - pastedObject.x;
    dragOffsetY = y - pastedObject.y;
    redraw();
    drawPastedOutline();
    return;
  }

  // Tap outside → paste new object
  pastedObject = {
    data: clipboard,
    x: x,
    y: y,
    w: clipboard.width,
    h: clipboard.height
  };

  pastedSelected = false;
  draggingPasted = false;

  redraw(); // clear red box after paste
}

// -------------------------
// Dragging pasted object
// -------------------------
canvas.addEventListener('touchmove', e => {
  if (!draggingPasted || !pastedSelected) return;

  const t = e.touches[0];
  const pos = getCanvasCoords(t.clientX, t.clientY);

  pastedObject.x = pos.x - dragOffsetX;
  pastedObject.y = pos.y - dragOffsetY;

  redraw();
  drawPastedOutline();
});

canvas.addEventListener('touchend', () => {
  draggingPasted = false;
});

// -------------------------
// Finish selection
// -------------------------
function finishSelection() {
  if (!isSelecting || !hasImage) return;

  isSelecting = false;

  const x = Math.min(startX, currentX);
  const y = Math.min(startY, currentY);
  const w = Math.abs(currentX - startX);
  const h = Math.abs(currentY - startY);

  if (w > 0 && h > 0) {
    selection = { x, y, w, h };
    copyBtn.disabled = false;
    cutBtn.disabled = false;
  } else {
    selection = null;
    copyBtn.disabled = true;
    cutBtn.disabled = true;
  }

  redraw();
  if (selection) drawSelectionRect();
}

// -------------------------
// Copy / Cut
// -------------------------
copyBtn.addEventListener('click', () => {
  if (!selection) return;

  clipboard = ctx.getImageData(selection.x, selection.y, selection.w, selection.h);
  pasteModeBtn.disabled = false;

  redraw(); // clear red box after copy
});

cutBtn.addEventListener('click', () => {
  if (!selection) return;

  clipboard = ctx.getImageData(selection.x, selection.y, selection.w, selection.h);
  ctx.clearRect(selection.x, selection.y, selection.w, selection.h);
  img.src = canvas.toDataURL();

  selection = null;
  isSelecting = false;

  copyBtn.disabled = true;
  cutBtn.disabled = true;
  pasteModeBtn.disabled = false;

  redraw(); // clear red box after cut
});

// -------------------------
// Paste Mode toggle
// -------------------------
pasteModeBtn.addEventListener('click', () => {
  if (!clipboard) return;

  pasteMode = !pasteMode;
  pasteModeBtn.classList.toggle('active', pasteMode);

  if (pasteMode) {
    selection = null;
    isSelecting = false;
    redraw(); // clear red box entering paste mode
  } else {
    pastedSelected = false;
    draggingPasted = false;
    redraw(); // clear blue box leaving paste mode
  }
});

// -------------------------
// Export PNG
// -------------------------
exportBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = "image.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
});

// -------------------------
// Drawing helpers
// -------------------------
function redraw() {
  if (!hasImage) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);

  if (pastedObject) {
    ctx.putImageData(pastedObject.data, pastedObject.x, pastedObject.y);
  }
}

function drawSelectionRect() {
  if (!selection && !isSelecting) return;

  const x = isSelecting ? Math.min(startX, currentX) : selection.x;
  const y = isSelecting ? Math.min(startY, currentY) : selection.y;
  const w = isSelecting ? Math.abs(currentX - startX) : selection.w;
  const h = isSelecting ? Math.abs(currentY - startY) : selection.h;

  ctx.save();
  ctx.strokeStyle = 'red';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(x, y, w, h);
  ctx.restore();
}

function drawPastedOutline() {
  if (!pastedSelected || !pastedObject) return;

  ctx.save();
  ctx.strokeStyle = 'blue';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(
    pastedObject.x,
    pastedObject.y,
    pastedObject.w,
    pastedObject.h
  );
  ctx.restore();
}

function isInsidePastedObject(x, y) {
  if (!pastedObject) return false;
  return (
    x >= pastedObject.x &&
    y >= pastedObject.y &&
    x <= pastedObject.x + pastedObject.w &&
    y <= pastedObject.y + pastedObject.h
  );
}
</script>

</body>
</html>
